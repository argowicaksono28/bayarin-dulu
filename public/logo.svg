<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2DD4BF" />
      <stop offset="100%" stop-color="#0F766E" />
    </linearGradient>
    <linearGradient id="g2" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#34D399" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>
  </defs>
  
  <rect width="100" height="100" fill="transparent" />
  
  <!-- Back rounded diamond/card -->
  <rect x="25" y="25" width="50" height="50" rx="12" fill="url(#g2)" opacity="0.9" transform="rotate(25 50 50)" />
  
  <!-- Front card sliding off (splitting) -->
  <rect x="25" y="25" width="50" height="50" rx="12" fill="url(#g1)" transform="translate(-8, -8)" />
  
  <!-- Add lines resembling a receipt/bill -->
  <line x1="32" y1="35" x2="52" y2="35" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" />
  <line x1="32" y1="46" x2="48" y2="46" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" />
  <line x1="32" y1="57" x2="42" y2="57" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" />
  
</svg>
